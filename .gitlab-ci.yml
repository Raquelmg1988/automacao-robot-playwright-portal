stages:
  - test

robot_tests:
  stage: test

  image: mcr.microsoft.com/playwright:v1.59.1-jammy

  before_script:
    - apt-get update
    - apt-get install -y python3-pip unzip openjdk-11-jre

    - pip install -r requirements.txt

    - rfbrowser init

    # cria pastas necessárias
    - mkdir -p results
    - mkdir -p allure-results

    # auth state (seguro)
    - cp "$AUTH_STATE_JSON" auth_state.json || true

  script:
    # execução Robot + output padrão
    - robot -d results tests

    # converte output.xml para allure
    - allure generate results -o allure-report --clean || true

  after_script:
    - rm -f auth_state.json || true

  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - results/
      - allure-results/
      - allure-report/